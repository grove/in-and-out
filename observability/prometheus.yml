global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: inandout-ingest
    static_configs:
      - targets:
          - ingest:9090
    metrics_path: /metrics

  - job_name: inandout-writeback
    static_configs:
      - targets:
          - writeback:9091
    metrics_path: /metrics
