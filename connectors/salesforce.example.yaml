schema_version: 1

connector:
  name: salesforce
  system: "Salesforce CRM"
  generation_profile: full_duplex
  api_version: "v59.0"

  connection:
    base_url: "https://myorg.my.salesforce.com"
    timeout:
      connect: "10s"
      read: "30s"
      write: "30s"

  auth:
    type: oauth2
    credential_ref: salesforce_app          # env: INOUT_CREDENTIAL_SALESFORCE_APP = "client_id:client_secret"
    oauth2:
      grant_type: client_credentials
      token_url: "https://myorg.my.salesforce.com/services/oauth2/token"
      scopes: []

  rate_limit:
    requests_per_second: 10

  datatypes:
    contacts:
      ingestion:
        primary_key: "Id"
        history_mode: overwrite
        schedule:
          interval: "10m"
        list:
          method: GET
          path: "/services/data/v59.0/query"
          record_selector: "records"
          pagination:
            strategy: cursor
            cursor:
              # Initial request: ?q=SELECT+Id,FirstName,...+FROM+Contact
              # Subsequent pages: GET nextRecordsUrl value from response body
              request_param: "q"
              response_path: "nextRecordsUrl"
          incremental:
            enabled: true
            cursor_field: "LastModifiedDate"
            cursor_type: timestamp
            request_filter:
              mode: query_param
              param: q
              value: "SELECT Id, FirstName, LastName, Email, Phone, LastModifiedDate FROM Contact WHERE LastModifiedDate > ${watermark} ORDER BY LastModifiedDate ASC"
        full_sync_query: "SELECT Id, FirstName, LastName, Email, Phone, LastModifiedDate FROM Contact ORDER BY LastModifiedDate ASC"

      writeback:
        protection_level: 2
        conflict_resolution: server_wins
        supported_actions:
          - update
        operations:
          lookup:
            method: GET
            path: "/services/data/v59.0/sobjects/Contact/${external_id}"
          update:
            method: PATCH
            path: "/services/data/v59.0/sobjects/Contact/${external_id}"

      simulator:
        seed_data:
          - Id: "003AA000007GHijABC"
            FirstName: "Alice"
            LastName: "Smith"
            Email: "alice.smith@acme.com"
            Phone: "+1-415-555-0101"
            LastModifiedDate: "2026-03-20T10:00:00Z"
          - Id: "003AA000007GHikDEF"
            FirstName: "Bob"
            LastName: "Jones"
            Email: "bob.jones@globex.com"
            Phone: "+1-512-555-0102"
            LastModifiedDate: "2026-03-21T14:30:00Z"
          - Id: "003AA000007GHilGHI"
            FirstName: "Carol"
            LastName: "Lee"
            Email: "carol.lee@initech.com"
            Phone: "+1-737-555-0103"
            LastModifiedDate: "2026-03-22T09:15:00Z"

    accounts:
      ingestion:
        primary_key: "Id"
        history_mode: overwrite
        schedule:
          interval: "15m"
        list:
          method: GET
          path: "/services/data/v59.0/query"
          record_selector: "records"
          pagination:
            strategy: cursor
            cursor:
              request_param: "q"
              response_path: "nextRecordsUrl"
          incremental:
            enabled: true
            cursor_field: "LastModifiedDate"
            cursor_type: timestamp
            request_filter:
              mode: query_param
              param: q
              value: "SELECT Id, Name, Industry, BillingCity, LastModifiedDate FROM Account WHERE LastModifiedDate > ${watermark} ORDER BY LastModifiedDate ASC"
        full_sync_query: "SELECT Id, Name, Industry, BillingCity, LastModifiedDate FROM Account ORDER BY LastModifiedDate ASC"

      simulator:
        seed_data:
          - Id: "001AA000003GHijABC"
            Name: "Acme Corp"
            Industry: "Technology"
            BillingCity: "San Francisco"
            LastModifiedDate: "2026-03-20T09:00:00Z"
          - Id: "001AA000003GHikDEF"
            Name: "Globex Corporation"
            Industry: "Manufacturing"
            BillingCity: "Springfield"
            LastModifiedDate: "2026-03-21T13:00:00Z"
          - Id: "001AA000003GHilGHI"
            Name: "Initech"
            Industry: "Finance"
            BillingCity: "Austin"
            LastModifiedDate: "2026-03-22T10:30:00Z"
