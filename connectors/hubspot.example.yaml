schema_version: 1

connector:
  name: hubspot
  system: HubSpot CRM
  generation_profile: full_duplex
  description: >
    HubSpot CRM contacts connector. Supports full-duplex sync:
    polling ingestion with cursor pagination, incremental sync,
    webhook fan-out, and writeback via PATCH.
  api_version: "v3"
  api_deprecation_deadline: null

  connection:
    base_url: https://api.hubapi.com
    timeout:
      connect: "10s"
      read: "30s"
      write: "30s"

  auth:
    type: oauth2
    credential_ref: hubspot_oauth
    oauth2:
      grant_type: client_credentials
      token_url: https://api.hubapi.com/oauth/v1/token
      scopes:
        - crm.objects.contacts.read
        - crm.objects.contacts.write

  rate_limit:
    requests_per_second: 9.0
    burst: 20

  retry:
    max_retries: 5
    backoff:
      initial: "1s"
      max: "60s"
      multiplier: 2.0
      jitter: true

  circuit_breaker:
    error_threshold: 10
    pause_duration: "60s"

  webhooks:
    path: /webhooks/hubspot
    signature:
      algorithm: hmac-sha256
      header: X-HubSpot-Signature-V3
      credential_ref: hubspot_webhook_secret
    fan_out:
      discriminator: objectType
      unmatched: log_and_discard
      routes:
        - match: contact.creation
          datatype: contacts
        - match: contact.propertyChange
          datatype: contacts
        - match: company.creation
          datatype: companies
        - match: company.propertyChange
          datatype: companies

  datatypes:
    contacts:
      description: HubSpot CRM contacts
      kind: entity

      ingestion:
        primary_key: id
        history_mode: overwrite
        schedule:
          interval: "5m"
        list:
          method: GET
          path: /crm/v3/objects/contacts
          record_selector: results
          pagination:
            strategy: cursor
            cursor:
              request_param: after
              response_path: "paging.next.after"
            termination:
              - empty_page
          incremental:
            enabled: true
            cursor_field: updatedAt
            cursor_type: timestamp
            request_filter:
              mode: query_param
              param: lastmodifieddate__gt
              value: "${watermark}"

      writeback:
        protection_level: 2
        conflict_resolution: last_writer_wins
        supported_actions:
          - update
        operations:
          lookup:
            method: GET
            path: /crm/v3/objects/contacts/${external_id}
          update:
            method: PATCH
            path: /crm/v3/objects/contacts/${external_id}
          insert:
            method: POST
            path: /crm/v3/objects/contacts
          delete:
            method: DELETE
            path: /crm/v3/objects/contacts/${external_id}

      simulator:
        # Single template record; seed_count tells the simulator to generate 5 records from it.
        # Set INOUT_HUBSPOT_BASE_URL=http://simulator:6100/hubspot to point
        # the engine at the local simulator instead of the real HubSpot API.
        seed_count: 5
        seed_data:
          - id: "1001"
            createdAt: "2026-03-20T10:00:00.000Z"
            updatedAt: "2026-03-20T10:00:00.000Z"
            archived: false
            properties:
              hs_object_id: "1001"
              firstname: Alice
              lastname: Smith
              email: alice.smith@example.com
              createdate: "2026-03-20T10:00:00.000Z"
              lastmodifieddate: "2026-03-20T10:00:00.000Z"

    companies:
      description: HubSpot CRM companies
      kind: entity

      ingestion:
        primary_key: id
        history_mode: overwrite
        schedule:
          interval: "5m"
        list:
          method: GET
          path: /crm/v3/objects/companies
          record_selector: results
          pagination:
            strategy: cursor
            cursor:
              request_param: after
              response_path: "paging.next.after"
            termination:
              - empty_page
          incremental:
            enabled: true
            cursor_field: updatedAt
            cursor_type: timestamp
            request_filter:
              mode: query_param
              param: lastmodifieddate__gt
              value: "${watermark}"

      writeback:
        protection_level: 2
        conflict_resolution: last_writer_wins
        supported_actions:
          - update
        operations:
          lookup:
            method: GET
            path: /crm/v3/objects/companies/${external_id}
          update:
            method: PATCH
            path: /crm/v3/objects/companies/${external_id}
          insert:
            method: POST
            path: /crm/v3/objects/companies
          delete:
            method: DELETE
            path: /crm/v3/objects/companies/${external_id}

      simulator:
        seed_count: 3
        seed_data:
          - id: "2001"
            createdAt: "2026-03-18T09:00:00.000Z"
            updatedAt: "2026-03-18T09:00:00.000Z"
            archived: false
            properties:
              hs_object_id: "2001"
              name: Acme Corp
              domain: acme.com
              industry: TECHNOLOGY
              numberofemployees: 250
              annualrevenue: "5000000"
              createdate: "2026-03-18T09:00:00.000Z"
              lastmodifieddate: "2026-03-18T09:00:00.000Z"

    associations:
      description: HubSpot CRM contact-to-company associations
      kind: relationship

      ingestion:
        primary_key: id
        history_mode: overwrite
        schedule:
          interval: "10m"
        list:
          method: GET
          path: /crm/v3/associations/contacts/companies/batch/read
          record_selector: results
          pagination:
            strategy: cursor
            cursor:
              request_param: after
              response_path: "paging.next.after"
            termination:
              - empty_page

      simulator:
        seed_count: 3
        seed_data:
          - id: "3001"
            from:
              id: "1001"
            to:
              - id: "2001"
                type: contact_to_company
