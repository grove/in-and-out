name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build book
        run: mdbook build book

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-build

  deploy:
    if: ${{ !github.event.repository.private }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  pages-not-supported:
    if: ${{ github.event.repository.private }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Explain why deploy was skipped
        run: |
          echo "GitHub Pages deployment skipped."
          echo "This repository is private, and the current GitHub plan does not support Pages for it."
          echo "Options: make the repo public, upgrade plan, or publish docs elsewhere."
