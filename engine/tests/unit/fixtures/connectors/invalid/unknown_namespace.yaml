schema_version: 1

connector:
  name: invalid_unknown_namespace
  system: demo
  generation_profile: ingestion_polling_readonly
  api_version: v1
  connection:
    base_url: https://api.example.com
  auth:
    type: api_key
    api_key:
      location: header
      name: X-API-Key
    credential_ref: demo_api_key
  datatypes:
    contacts:
      ingestion:
        primary_key: id
        history_mode: overwrite
        schedule:
          interval: 5m
        list:
          method: GET
          path: /v1/contacts
          record_selector: results
          pagination:
            strategy: cursor
            cursor:
              response_path: paging.next.after
              request_param: after
          incremental:
            enabled: true
            cursor_field: updated_at
            cursor_type: timestamp
            request_filter:
              mode: query_param
              param: updated_since
              value: ${foo.bar}