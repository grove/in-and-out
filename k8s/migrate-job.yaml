apiVersion: batch/v1
kind: Job
metadata:
  name: inandout-migrate
  namespace: inandout
  annotations:
    # Re-run by incrementing the name suffix or using kubectl replace --force
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: inandout:latest
          imagePullPolicy: IfNotPresent
          command: ["inandout", "db", "upgrade", "--config", "/config/ingestion.yaml"]
          envFrom:
            - secretRef:
                name: inandout-credentials
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: inandout-config
