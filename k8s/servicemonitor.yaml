# ServiceMonitor for Prometheus Operator (CRD: monitoring.coreos.com/v1).
# Scrapes both the ingestion and writeback deployments at /metrics.
#
# Requires the Prometheus Operator to be installed in the cluster:
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: inandout-ingest
  namespace: inandout
  labels:
    release: kube-prometheus-stack  # must match your Prometheus Operator selector
spec:
  selector:
    matchLabels:
      app: inandout-ingest
  endpoints:
    - port: health
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: inandout-writeback
  namespace: inandout
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: inandout-writeback
  endpoints:
    - port: health
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
