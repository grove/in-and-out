apiVersion: v1
kind: Secret
metadata:
  name: inandout-credentials
  namespace: inandout
type: Opaque
stringData:
  # Database connection URL (required)
  INOUT_DATABASE_URL: "postgresql://inandout:changeme@postgres:5432/inandout"

  # Connector credentials — add one entry per connector credential_ref.
  # The env var name follows the pattern: INOUT_CREDENTIAL_<CREDENTIAL_REF_UPPER>
  # Example:
  # INOUT_CREDENTIAL_MY_API_KEY: "your-api-key-here"
  # INOUT_CREDENTIAL_MY_OAUTH_SECRET: "client-id:client-secret"
